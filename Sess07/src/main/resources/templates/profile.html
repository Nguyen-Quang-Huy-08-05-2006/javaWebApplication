<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Restaurant Profile</title>
</head>
<body>

<h2>Cập nhật thông tin nhà hàng</h2>

<form th:action="@{/merchant/update-profile}"
      th:object="${restaurantProfile}"
      method="post">

    <label>Tên cửa hàng:</label><br/>
    <input type="text" th:field="*{name}" /><br/><br/>

    <label>Số điện thoại:</label><br/>
    <input type="text" th:field="*{phone}" /><br/><br/>

    <label>Đang mở cửa:</label><br/>
    <input type="checkbox" th:field="*{active}" /><br/><br/>

    <button type="submit">Lưu thông tin</button>

</form>

</body>
</html>
