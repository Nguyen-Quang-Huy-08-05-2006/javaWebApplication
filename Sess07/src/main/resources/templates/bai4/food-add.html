<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm món</title>
</head>
<body>

<h2>Thêm món ăn</h2>

<p style="color:red" th:text="${error}"></p>

<form th:action="@{/merchant/food4/add}"
      th:object="${food}"
      method="post"
      enctype="multipart/form-data">

    <input type="text" th:field="*{name}" placeholder="Tên món"/><br/><br/>
    <input type="text" th:field="*{category}" placeholder="Danh mục"/><br/><br/>
    <input type="number" th:field="*{price}" placeholder="Giá"/><br/><br/>

    <input type="file" name="image"/><br/><br/>

    <button type="submit">Thêm</button>
</form>

</body>
</html>
