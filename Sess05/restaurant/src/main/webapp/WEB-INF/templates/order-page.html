<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Đặt món nhanh</title>
</head>
<body>

<h2> Đặt món nhanh</h2>

<table border="1">
    <tr>
        <th>Tên</th>
        <th>Giá</th>
    </tr>

    <tr>
        <td>Bún chả</td>
        <td>40000</td>
    </tr>

    <tr th:each="dish : ${dishes}">
        <td th:text="${dish.name}">Tên món</td>
        <td th:text="${dish.price}">0</td>
    </tr>
</table>

<h3>
    Tổng tiền:
    <span th:text="${total}">0</span>
</h3>

</body>
</html>
